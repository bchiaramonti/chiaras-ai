<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; background: #fffdef; font-family: "twkEverett", Arial, sans-serif; }
  svg { display: block; }
  .axis text { font-family: "twkEverett", Arial, sans-serif; font-size: 11px; fill: #AEADA8; }
  .axis path, .axis line { stroke: #D0D0CC; }
  .axis .domain { stroke: #D0D0CC; }
  .grid line { stroke: #F6F6F5; stroke-width: 1; }
  .grid .domain { display: none; }
  .annotation { font-family: "twkEverett", Arial, sans-serif; font-size: 11px; fill: #79755C; }
  .data-label { font-family: "twkEverett", Arial, sans-serif; font-size: 10px; fill: #4F4E3C; font-weight: bold; }
  @font-face { font-family: twkEverett; src: url("https://multi7.com.br/_next/static/media/TWKEverett_Regular-s.p.4411e19a.otf") format("opentype"); font-weight: 400; font-display: swap; }
</style>
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<svg id="chart" width="880" height="350"></svg>
<script>
const M7 = {
  series: ['#424135', '#EEF77C', '#79755C', '#4CAF50', '#3B82F6', '#14B8A6'],
  positive: '#4CAF50', negative: '#E46962',
  dark: '#424135', text: '#4F4E3C', textMed: '#79755C', textLight: '#AEADA8',
  axis: '#AEADA8', grid: '#F6F6F5', separator: '#D0D0CC', white: '#FFFFFF', offWhite: '#fffdef',
};

const WIDTH = 880, HEIGHT = 350;
const MARGIN = { top: 30, right: 80, bottom: 40, left: 60 };
const innerWidth = WIDTH - MARGIN.left - MARGIN.right;
const innerHeight = HEIGHT - MARGIN.top - MARGIN.bottom;

// DATA FORMAT:
// {
//   labels: ["Jan", "Feb", "Mar", ...],
//   series: [
//     { name: "Captação Líquida", values: [120, 135, 142, ...], highlight: true },
//     { name: "Meta", values: [130, 130, 130, ...], highlight: false, dashed: true }
//   ],
//   annotations: [
//     { index: 4, text: "Inflexão: +R$ 248MM", position: "above" }
//   ],
//   yLabel: "R$ MM",
//   yFormat: ",.0f"
// }
const DATA = {{DATA_JSON}};

const svg = d3.select('#chart');
const g = svg.append('g').attr('transform', `translate(${MARGIN.left},${MARGIN.top})`);

// Scales
const x = d3.scalePoint()
  .domain(DATA.labels)
  .range([0, innerWidth]);

const allValues = DATA.series.flatMap(s => s.values);
const yMin = Math.min(0, d3.min(allValues));
const yMax = d3.max(allValues) * 1.1;
const y = d3.scaleLinear()
  .domain([yMin, yMax])
  .range([innerHeight, 0])
  .nice();

// Grid
g.append('g')
  .attr('class', 'grid')
  .call(d3.axisLeft(y).tickSize(-innerWidth).tickFormat(''));

// Axes
g.append('g')
  .attr('class', 'axis')
  .attr('transform', `translate(0,${innerHeight})`)
  .call(d3.axisBottom(x));

const yAxis = g.append('g')
  .attr('class', 'axis')
  .call(d3.axisLeft(y).tickFormat(d => d3.format(DATA.yFormat || ',.0f')(d)));

if (DATA.yLabel) {
  yAxis.append('text')
    .attr('fill', M7.textLight)
    .attr('transform', 'rotate(-90)')
    .attr('y', -45)
    .attr('x', -innerHeight / 2)
    .attr('text-anchor', 'middle')
    .style('font-size', '10px')
    .text(DATA.yLabel);
}

// Zero line (if y range crosses zero)
if (yMin < 0) {
  g.append('line')
    .attr('x1', 0).attr('x2', innerWidth)
    .attr('y1', y(0)).attr('y2', y(0))
    .attr('stroke', M7.separator).attr('stroke-width', 1.5);
}

// Lines
const line = d3.line()
  .x((d, i) => x(DATA.labels[i]))
  .y(d => y(d))
  .curve(d3.curveMonotoneX);

DATA.series.forEach((series, si) => {
  const color = series.highlight ? M7.series[si] : M7.textLight;
  const strokeWidth = series.highlight ? 2.5 : 1.5;

  g.append('path')
    .datum(series.values)
    .attr('fill', 'none')
    .attr('stroke', color)
    .attr('stroke-width', strokeWidth)
    .attr('stroke-dasharray', series.dashed ? '6,4' : 'none')
    .attr('d', line);

  // End label
  const lastVal = series.values[series.values.length - 1];
  g.append('text')
    .attr('x', innerWidth + 8)
    .attr('y', y(lastVal))
    .attr('dy', '0.35em')
    .attr('fill', color)
    .style('font-family', 'Arial, sans-serif')
    .style('font-size', series.highlight ? '11px' : '10px')
    .style('font-weight', series.highlight ? 'bold' : 'normal')
    .text(series.name);

  // Dots on highlighted series
  if (series.highlight) {
    g.selectAll(`.dot-${si}`)
      .data(series.values)
      .enter()
      .append('circle')
      .attr('cx', (d, i) => x(DATA.labels[i]))
      .attr('cy', d => y(d))
      .attr('r', 3)
      .attr('fill', color)
      .attr('stroke', M7.white)
      .attr('stroke-width', 1.5);
  }
});

// Annotations
if (DATA.annotations) {
  DATA.annotations.forEach(ann => {
    const xPos = x(DATA.labels[ann.index]);
    const seriesIdx = ann.seriesIndex || 0;
    const yVal = DATA.series[seriesIdx].values[ann.index];
    const yPos = y(yVal);
    const above = ann.position !== 'below';

    // Annotation line
    g.append('line')
      .attr('x1', xPos).attr('x2', xPos)
      .attr('y1', yPos + (above ? -8 : 8))
      .attr('y2', yPos + (above ? -30 : 30))
      .attr('stroke', M7.textMed)
      .attr('stroke-width', 1)
      .attr('stroke-dasharray', '2,2');

    // Annotation text
    g.append('text')
      .attr('class', 'annotation')
      .attr('x', xPos)
      .attr('y', yPos + (above ? -35 : 45))
      .attr('text-anchor', 'middle')
      .text(ann.text);
  });
}

document.documentElement.setAttribute('data-rendered', 'true');
</script>
</body>
</html>
