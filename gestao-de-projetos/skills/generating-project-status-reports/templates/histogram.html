<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; background: #fffdef; font-family: "twkEverett", Arial, sans-serif; }
  svg { display: block; }
  .axis text { font-family: "twkEverett", Arial, sans-serif; font-size: 11px; fill: #AEADA8; }
  .axis path, .axis line { stroke: #D0D0CC; }
  .axis .domain { stroke: #D0D0CC; }
  .grid line { stroke: #F6F6F5; stroke-width: 1; }
  .grid .domain { display: none; }
  .data-label { font-family: "twkEverett", Arial, sans-serif; font-size: 9px; fill: #4F4E3C; font-weight: bold; }
  .axis-label { font-family: "twkEverett", Arial, sans-serif; font-size: 11px; fill: #79755C; }
  .mean-label { font-family: "twkEverett", Arial, sans-serif; font-size: 10px; fill: #79755C; }
  @font-face { font-family: twkEverett; src: url("https://multi7.com.br/_next/static/media/TWKEverett_Regular-s.p.4411e19a.otf") format("opentype"); font-weight: 400; font-display: swap; }
</style>
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<svg id="chart" width="880" height="350"></svg>
<script>
const M7 = {
  series: ['#424135', '#EEF77C', '#79755C', '#4CAF50', '#3B82F6', '#14B8A6'],
  dark: '#424135', text: '#4F4E3C', textMed: '#79755C', textLight: '#AEADA8',
  grid: '#F6F6F5', separator: '#D0D0CC', white: '#FFFFFF', offWhite: '#fffdef',
};

const WIDTH = 880, HEIGHT = 350;
const MARGIN = { top: 20, right: 30, bottom: 50, left: 60 };
const innerWidth = WIDTH - MARGIN.left - MARGIN.right;
const innerHeight = HEIGHT - MARGIN.top - MARGIN.bottom;

// DATA FORMAT:
// {
//   values: [12, 15, 18, 22, 25, 28, 30, ...],
//   bins: 15,
//   xLabel: "Ticket Médio (R$ mil)",
//   yLabel: "Frequência",
//   showMean: true,
//   showMedian: false,
//   color: null
// }
const DATA = {{DATA_JSON}};

const svg = d3.select('#chart');
const g = svg.append('g').attr('transform', `translate(${MARGIN.left},${MARGIN.top})`);

// Compute histogram
const xExtent = d3.extent(DATA.values);
const x = d3.scaleLinear()
  .domain(xExtent)
  .range([0, innerWidth])
  .nice();

const histogram = d3.bin()
  .domain(x.domain())
  .thresholds(x.ticks(DATA.bins || 15));

const bins = histogram(DATA.values);

const y = d3.scaleLinear()
  .domain([0, d3.max(bins, d => d.length) * 1.1])
  .range([innerHeight, 0])
  .nice();

// Grid
g.append('g')
  .attr('class', 'grid')
  .call(d3.axisLeft(y).tickSize(-innerWidth).tickFormat(''));

// Axes
g.append('g')
  .attr('class', 'axis')
  .attr('transform', `translate(0,${innerHeight})`)
  .call(d3.axisBottom(x));

g.append('g')
  .attr('class', 'axis')
  .call(d3.axisLeft(y));

// Axis labels
if (DATA.xLabel) {
  svg.append('text')
    .attr('class', 'axis-label')
    .attr('x', MARGIN.left + innerWidth / 2)
    .attr('y', HEIGHT - 8)
    .attr('text-anchor', 'middle')
    .text(DATA.xLabel);
}

if (DATA.yLabel) {
  svg.append('text')
    .attr('class', 'axis-label')
    .attr('transform', 'rotate(-90)')
    .attr('x', -(MARGIN.top + innerHeight / 2))
    .attr('y', 15)
    .attr('text-anchor', 'middle')
    .text(DATA.yLabel);
}

// Bars
const barColor = DATA.color || M7.series[0];

g.selectAll('.bar')
  .data(bins)
  .enter()
  .append('rect')
  .attr('x', d => x(d.x0) + 1)
  .attr('y', d => y(d.length))
  .attr('width', d => Math.max(0, x(d.x1) - x(d.x0) - 2))
  .attr('height', d => innerHeight - y(d.length))
  .attr('fill', barColor)
  .attr('rx', 1);

// Count labels on top of bars
g.selectAll('.data-label')
  .data(bins)
  .enter()
  .append('text')
  .attr('class', 'data-label')
  .attr('x', d => (x(d.x0) + x(d.x1)) / 2)
  .attr('y', d => y(d.length) - 4)
  .attr('text-anchor', 'middle')
  .text(d => d.length > 0 ? d.length : '');

// Mean line
if (DATA.showMean) {
  const mean = d3.mean(DATA.values);
  g.append('line')
    .attr('x1', x(mean)).attr('x2', x(mean))
    .attr('y1', 0).attr('y2', innerHeight)
    .attr('stroke', M7.darkSlate)
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '6,4');

  g.append('text')
    .attr('class', 'mean-label')
    .attr('x', x(mean) + 6)
    .attr('y', 12)
    .text(`Média: ${d3.format(',.1f')(mean)}`);
}

// Median line
if (DATA.showMedian) {
  const median = d3.median(DATA.values);
  g.append('line')
    .attr('x1', x(median)).attr('x2', x(median))
    .attr('y1', 0).attr('y2', innerHeight)
    .attr('stroke', M7.series[1])
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '4,3');

  g.append('text')
    .attr('class', 'mean-label')
    .attr('x', x(median) + 6)
    .attr('y', 28)
    .attr('fill', M7.series[1])
    .text(`Mediana: ${d3.format(',.1f')(median)}`);
}

document.documentElement.setAttribute('data-rendered', 'true');
</script>
</body>
</html>
